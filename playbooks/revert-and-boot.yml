---
# playbooks/revert-and-boot.yml — Revert all lab VMs to a snapshot, boot, and wait for SSH
#
# Usage:
#   ansible-playbook -i inventory.yml playbooks/revert-and-boot.yml
#   ansible-playbook -i inventory.yml playbooks/revert-and-boot.yml -e "revert_snapshot=C2-Ready"
#   ansible-playbook -i inventory.yml playbooks/revert-and-boot.yml -e "revert_targets=victims"
#
# Modes (revert_targets):
#   all      — revert every VM (default)
#   sensors  — sensors + attacker only
#   victims  — victims only
#
# Defaults: reverts all VMs to C2-Ready, boots headless, waits for SSH.

- name: "Revert & boot — {{ revert_targets | default('all') }} → {{ revert_snapshot | default('C2-Ready') }}"
  hosts: localhost
  connection: local
  gather_facts: no
  vars:
    vboxmanage: '/mnt/c/Program Files/Oracle/VirtualBox/VBoxManage.exe'
    _snapshot: "{{ revert_snapshot | default('C2-Ready') }}"
    _mode: "{{ revert_targets | default('all') }}"
    boot_wait: 90

    vm_map:
      atk-kali-01:
        vmname: ATK-KALI-01
        ip: 172.16.10.10
        group: infra
      mon-seconion-01:
        vmname: MON-SECONION-01
        ip: 172.16.30.10
        group: sensors
      mon-zeek-01:
        vmname: MON-ZEEK-01
        ip: 172.16.30.11
        group: sensors
      mon-suricata-01:
        vmname: MON-SURICATA-01
        ip: 172.16.30.12
        group: sensors
      mon-rita-01:
        vmname: MON-RITA-01
        ip: 172.16.30.13
        group: sensors
      vic-win-01:
        vmname: VIC-WIN-01
        ip: 172.16.20.10
        group: victims
      vic-lnx-01:
        vmname: VIC-LNX-01
        ip: 172.16.20.11
        group: victims

  tasks:
    # ── Build target list ──
    - name: Build VM group lists
      set_fact:
        _all_vms: "{{ vm_map.keys() | list }}"
        _sensor_vms: "{{ vm_map | dict2items | selectattr('value.group', 'in', ['infra', 'sensors']) | map(attribute='key') | list }}"
        _victim_vms: "{{ vm_map | dict2items | selectattr('value.group', 'equalto', 'victims') | map(attribute='key') | list }}"

    - name: Select targets for revert_targets={{ _mode }}
      set_fact:
        _targets: "{{ _all_vms if _mode == 'all' else (_sensor_vms if _mode == 'sensors' else _victim_vms) }}"

    - name: Show plan
      debug:
        msg: "Reverting {{ _targets | length }} VMs to '{{ _snapshot }}': {{ _targets | join(', ') }}"

    # ── Power off ──
    - name: Power off VMs before restore
      command: >
        "{{ vboxmanage }}" controlvm "{{ vm_map[item].vmname }}" poweroff
      loop: "{{ _targets }}"
      ignore_errors: yes

    - name: Brief pause after poweroff
      pause:
        seconds: 5

    # ── Revert to snapshot ──
    - name: Revert VMs to snapshot '{{ _snapshot }}'
      command: >
        "{{ vboxmanage }}" snapshot "{{ vm_map[item].vmname }}" restore "{{ _snapshot }}"
      loop: "{{ _targets }}"

    - name: Discard any saved state after revert
      command: >
        "{{ vboxmanage }}" discardstate "{{ vm_map[item].vmname }}"
      loop: "{{ _targets }}"
      ignore_errors: yes

    # ── Boot ──
    - name: Start VMs headless
      command: >
        "{{ vboxmanage }}" startvm "{{ vm_map[item].vmname }}" --type headless
      loop: "{{ _targets }}"
      register: start_results
      failed_when: false

    - name: Report start results
      debug:
        msg: "{{ item.item }}: {{ 'started' if item.rc == 0 else 'already running or error (rc=' ~ item.rc ~ ')' }}"
      loop: "{{ start_results.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "Wait {{ boot_wait }}s for VMs to initialize"
      pause:
        seconds: "{{ boot_wait }}"

    # ── Wait for SSH ──
    - name: Wait for SSH connectivity
      wait_for:
        host: "{{ vm_map[item].ip }}"
        port: 22
        delay: 5
        timeout: 180
      loop: "{{ _targets }}"

    - debug:
        msg: "✓ {{ _targets | length }} VMs reverted to '{{ _snapshot }}' and SSH ready"
